<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Maison Blanche</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="site-header">
        <a href="../home/index.html" class="logo">
            <img src="../assets/logo2black.png">
        </a>
        <button class="menu-toggle" aria-label="Abrir menu">☰</button>
        <nav class="nav-menu">
            <a href="../servicos/index.html">Serviços</a>
            <a href="../produtos/index.html">Produtos</a>
            <a href="../depoimentos/index.html">Depoimentos</a>
            <a href="../sobre-nos/index.html">Sobre Nós</a>
            <a href="../contato/index.html" class="active">Contato</a>
        </nav>
    </header>

    <main class="page-main contact-main">

        <section class="contact-layout">

            <!-- ESQUERDA -->
            <div class="contact-left">

                <h1>Fale conosco.</h1>

                <div class="contact-info">
                    <p><strong>WhatsApp</strong><br>
                        (15) 99640-6172<br>
                        (15) 99604-7505
                    </p>

                    <p><strong>Instagram</strong><br>@maison_blanche_studioo</p>

                    <p><strong>Endereço</strong><br>
                        Rua Bruno Ferro, 166<br>Central Parque -Sorocaba - SP</p>

                    <p><strong>Horário</strong><br>
                        Ter - Sáb: 09h às 18h</p>
                </div>

                <!-- FORM -->
                <form class="contact-form" id="contactForm">
                    <input type="text" placeholder="Seu nome" id="nome" required>
                    <input type="tel" placeholder="Telefone" id="telefone" required>
                    <textarea placeholder="Mensagem" id="mensagem" required></textarea>

                    <button type="submit">Fale Conosco</button>
                </form>

            </div>

            <!-- DIREITA -->
            <div class="contact-right">
                <img src="../assets/fone.png" class="contact-image">
            </div>

            <p class="contact-hashtag">#MaisonBlancheExperience</p>

        </section>

    </main>

    <script src="../js/contato.js"></script>

</body>

</html>
